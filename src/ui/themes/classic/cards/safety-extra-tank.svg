<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-safety)" stroke-width="4"/>
  <g transform="translate(100,118)">
    <!-- Jerry can: handle on top, spout on right, body -->
    <!-- Handle -->
    <rect x="-22" y="-58" width="32" height="10" rx="3" fill="var(--color-safety)" stroke="var(--card-fg)" stroke-width="2"/>
    <!-- Spout (right side) -->
    <rect x="36" y="-44" width="14" height="14" rx="2" fill="var(--color-safety)" stroke="var(--card-fg)" stroke-width="2"/>
    <!-- Body -->
    <path d="M-46,-48 L36,-48 L36,52 L-46,52 Z" fill="var(--color-safety)" stroke="var(--card-fg)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Indents -->
    <g fill="none" stroke="var(--card-fg)" stroke-width="2" opacity="0.5">
      <path d="M-32,-30 L22,-30"/>
      <path d="M-32,34 L22,34"/>
      <path d="M-5,-30 L-5,34"/>
    </g>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="var(--card-fg)" letter-spacing="0.05em">EXTRA TANK</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">SAFETY</text>
</svg>
