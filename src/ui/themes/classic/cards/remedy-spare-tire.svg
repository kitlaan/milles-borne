<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-remedy)" stroke-width="4"/>
  <g transform="translate(100,118)">
    <!-- Outer tire -->
    <circle r="56" fill="var(--card-fg)" stroke="var(--color-remedy)" stroke-width="4"/>
    <!-- Tread ridges -->
    <g stroke="var(--card-bg)" stroke-width="3" opacity="0.55">
      <line x1="0" y1="-56" x2="0" y2="-44"/>
      <line x1="56" y1="0" x2="44" y2="0"/>
      <line x1="0" y1="56" x2="0" y2="44"/>
      <line x1="-56" y1="0" x2="-44" y2="0"/>
      <line x1="40" y1="-40" x2="32" y2="-32"/>
      <line x1="40" y1="40" x2="32" y2="32"/>
      <line x1="-40" y1="40" x2="-32" y2="32"/>
      <line x1="-40" y1="-40" x2="-32" y2="-32"/>
    </g>
    <!-- Hub -->
    <circle r="22" fill="var(--card-bg)" stroke="var(--card-fg)" stroke-width="2"/>
    <!-- Lug nuts -->
    <g fill="var(--card-fg)">
      <circle r="3" cx="0" cy="-12"/>
      <circle r="3" cx="12" cy="0"/>
      <circle r="3" cx="0" cy="12"/>
      <circle r="3" cx="-12" cy="0"/>
    </g>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="var(--card-fg)" letter-spacing="0.05em">SPARE TIRE</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">REMEDY</text>
</svg>
