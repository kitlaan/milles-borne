<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-hazard)" stroke-width="4"/>
  <g transform="translate(100,118)">
    <!-- Tire: a full circle of radius 54 centered on (0,0) with a small
         chord cut off the bottom (y=20) — looks like a circle resting on
         the ground compressed slightly. -->
    <path d="M -50,20 A 54,54 0 1,1 50,20 Z"
          fill="var(--card-fg)" stroke="var(--color-hazard)" stroke-width="3" stroke-linejoin="round"/>
    <!-- Hub centered on the tire's geometric center (0,0). -->
    <circle cx="0" cy="0" r="20" fill="var(--card-bg)" stroke="var(--card-fg)" stroke-width="2"/>
    <g fill="var(--card-fg)">
      <circle cx="0" cy="-10" r="2.5"/>
      <circle cx="10" cy="0" r="2.5"/>
      <circle cx="0" cy="10" r="2.5"/>
      <circle cx="-10" cy="0" r="2.5"/>
    </g>
    <!-- Ground line just below the flat -->
    <line x1="-66" y1="22" x2="66" y2="22" stroke="var(--card-fg)" stroke-width="2" opacity="0.55"/>
    <!-- Puncture mark on upper-right of casing -->
    <g transform="translate(34,-30)" stroke="var(--color-hazard)" stroke-width="2.5" stroke-linecap="round">
      <line x1="-6" y1="-6" x2="6" y2="6"/>
      <line x1="-6" y1="6" x2="6" y2="-6"/>
    </g>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="var(--card-fg)" letter-spacing="0.05em">FLAT TIRE</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">HAZARD</text>
</svg>
