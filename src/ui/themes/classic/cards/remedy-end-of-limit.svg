<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-remedy)" stroke-width="4"/>
  <g transform="translate(100,118)">
    <!-- Speed-limit-style sign, but greyed + diagonal strike to denote END OF LIMIT -->
    <circle r="56" fill="#fff" stroke="var(--card-fg)" stroke-width="5"/>
    <text x="0" y="16" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="44" fill="var(--card-fg)" opacity="0.6">50</text>
    <!-- Diagonal strike, in remedy green -->
    <line x1="-46" y1="-46" x2="46" y2="46" stroke="var(--color-remedy)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="13" fill="var(--card-fg)" letter-spacing="0.05em">END OF LIMIT</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">REMEDY</text>
</svg>
