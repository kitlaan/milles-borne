<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-hazard)" stroke-width="4"/>
  <g transform="translate(100,118)" fill="none" stroke="var(--color-hazard)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pump body -->
    <rect x="-32" y="-50" width="48" height="92" rx="3" fill="var(--color-hazard)" stroke="none"/>
    <!-- Gauge -->
    <rect x="-22" y="-40" width="28" height="20" rx="2" fill="var(--card-bg)" stroke="none"/>
    <text x="-8" y="-25" text-anchor="middle" font-family="Helvetica, sans-serif" font-weight="700" font-size="14" fill="var(--card-fg)" stroke="none">E</text>
    <!-- Nozzle / hose -->
    <path d="M16,-30 q22,4 22,28 v40" stroke="var(--color-hazard)"/>
    <!-- Empty indicator slash -->
    <line x1="-50" y1="-58" x2="50" y2="50" stroke="var(--card-fg)" stroke-width="6" opacity="0.7"/>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="var(--card-fg)" letter-spacing="0.05em">OUT OF GAS</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">HAZARD</text>
</svg>
