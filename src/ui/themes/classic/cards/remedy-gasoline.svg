<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280">
  <rect x="4" y="4" width="192" height="272" rx="14" fill="var(--card-bg)" stroke="var(--color-remedy)" stroke-width="4"/>
  <g transform="translate(100,118)">
    <!-- Filled gas pump (green-themed, indicating full / refuel) -->
    <rect x="-32" y="-50" width="48" height="92" rx="3" fill="var(--color-remedy)" stroke="var(--card-fg)" stroke-width="2"/>
    <rect x="-22" y="-40" width="28" height="20" rx="2" fill="var(--card-bg)" stroke="var(--card-fg)" stroke-width="1"/>
    <text x="-8" y="-25" text-anchor="middle" font-family="Helvetica, sans-serif" font-weight="700" font-size="14" fill="var(--color-remedy)">F</text>
    <!-- Hose -->
    <path d="M16,-30 q22,4 22,28 v40" fill="none" stroke="var(--color-remedy)" stroke-width="5" stroke-linecap="round"/>
    <!-- Drop -->
    <path d="M38,42 q-6,-10 0,-18 q6,8 0,18 z" fill="var(--color-remedy)" stroke="var(--card-fg)" stroke-width="1"/>
  </g>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="var(--card-fg)" letter-spacing="0.05em">GASOLINE</text>
  <text x="100" y="254" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="var(--card-fg)" opacity="0.55" letter-spacing="0.08em">REMEDY</text>
</svg>
